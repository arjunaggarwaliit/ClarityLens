<svg viewBox="0 0 900 480" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="a" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect x="300" y="10" width="300" height="40" rx="8" fill="#F3F4F6" stroke="#6B7280" stroke-width="0.8"/>
  <text x="450" y="35" text-anchor="middle" font-size="13" font-weight="600" fill="#374151">Raw paragraph text input</text>

  <line x1="350" y1="50" x2="150" y2="85" stroke="#7C3AED" stroke-width="1" marker-end="url(#a)"/>
  <line x1="450" y1="50" x2="450" y2="85" stroke="#10B981" stroke-width="1" marker-end="url(#a)"/>
  <line x1="550" y1="50" x2="750" y2="85" stroke="#F97316" stroke-width="1" marker-end="url(#a)"/>

  <rect x="30" y="90" width="240" height="165" rx="10" fill="#EDE9FE" stroke="#7C3AED" stroke-width="0.8"/>
  <text x="150" y="115" text-anchor="middle" font-size="13" font-weight="700" fill="#4C1D95">Signal 1: FK grade</text>
  <text x="150" y="135" text-anchor="middle" font-size="11" fill="#5B21B6">Weight: 0.40</text>
  <line x1="45" y1="145" x2="255" y2="145" stroke="#C4B5FD" stroke-width="0.5"/>
  <text x="150" y="165" text-anchor="middle" font-size="10" fill="#6D28D9">Syllable counter O(n)</text>
  <text x="150" y="183" text-anchor="middle" font-size="10" fill="#6D28D9">Sentence splitter</text>
  <text x="150" y="201" text-anchor="middle" font-size="10" fill="#6D28D9">Normalized: grade 5→0, 20→1</text>
  <text x="150" y="225" text-anchor="middle" font-size="10" font-weight="600" fill="#7C3AED">Latency: &lt;2ms</text>
  <text x="150" y="245" text-anchor="middle" font-size="9" fill="#8B5CF6">Catches: long sentences, polysyllables</text>

  <rect x="330" y="90" width="240" height="165" rx="10" fill="#D1FAE5" stroke="#10B981" stroke-width="0.8"/>
  <text x="450" y="115" text-anchor="middle" font-size="13" font-weight="700" fill="#065F46">Signal 2: jargon</text>
  <text x="450" y="135" text-anchor="middle" font-size="11" fill="#047857">Weight: 0.35</text>
  <line x1="345" y1="145" x2="555" y2="145" stroke="#6EE7B7" stroke-width="0.5"/>
  <text x="450" y="165" text-anchor="middle" font-size="10" fill="#059669">Set.has() → O(1) per word</text>
  <text x="450" y="183" text-anchor="middle" font-size="10" fill="#059669">2K common words lookup</text>
  <text x="450" y="201" text-anchor="middle" font-size="10" fill="#059669">Weight by syllable count</text>
  <text x="450" y="225" text-anchor="middle" font-size="10" font-weight="600" fill="#10B981">Latency: &lt;3ms</text>
  <text x="450" y="245" text-anchor="middle" font-size="9" fill="#34D399">Catches: domain terminology FK misses</text>

  <rect x="630" y="90" width="240" height="165" rx="10" fill="#FFEDD5" stroke="#F97316" stroke-width="0.8"/>
  <text x="750" y="115" text-anchor="middle" font-size="13" font-weight="700" fill="#9A3412">Signal 3: structural</text>
  <text x="750" y="135" text-anchor="middle" font-size="11" fill="#C2410C">Weight: 0.25</text>
  <line x1="645" y1="145" x2="855" y2="145" stroke="#FDBA74" stroke-width="0.5"/>
  <text x="750" y="165" text-anchor="middle" font-size="10" fill="#EA580C">Clause depth (commas, subordinators)</text>
  <text x="750" y="183" text-anchor="middle" font-size="10" fill="#EA580C">Passive voice ratio (regex)</text>
  <text x="750" y="201" text-anchor="middle" font-size="10" fill="#EA580C">Pronoun ambiguity detection</text>
  <text x="750" y="225" text-anchor="middle" font-size="10" font-weight="600" fill="#F97316">Latency: &lt;2ms</text>
  <text x="750" y="245" text-anchor="middle" font-size="9" fill="#FB923C">Catches: confusing structure, simple words</text>

  <line x1="150" y1="255" x2="350" y2="295" stroke="#7C3AED" stroke-width="1" marker-end="url(#a)"/>
  <line x1="450" y1="255" x2="450" y2="295" stroke="#10B981" stroke-width="1" marker-end="url(#a)"/>
  <line x1="750" y1="255" x2="550" y2="295" stroke="#F97316" stroke-width="1" marker-end="url(#a)"/>

  <text x="230" y="282" text-anchor="middle" font-size="11" font-weight="600" fill="#7C3AED">× 0.40</text>
  <text x="450" y="282" text-anchor="middle" font-size="11" font-weight="600" fill="#10B981">× 0.35</text>
  <text x="660" y="282" text-anchor="middle" font-size="11" font-weight="600" fill="#F97316">× 0.25</text>

  <rect x="250" y="300" width="400" height="48" rx="8" fill="#F3F4F6" stroke="#374151" stroke-width="1"/>
  <text x="450" y="320" text-anchor="middle" font-size="13" font-weight="700" fill="#111827">C = 0.40·S_FK + 0.35·S_jar + 0.25·S_str</text>
  <text x="450" y="340" text-anchor="middle" font-size="10" fill="#6B7280">Composite: 0.0 (easy) → 1.0 (very hard) | Total: 5-15ms/paragraph</text>

  <line x1="450" y1="348" x2="450" y2="385" stroke="#374151" stroke-width="1" marker-end="url(#a)"/>

  <rect x="250" y="390" width="400" height="36" rx="8" fill="#FEF3C7" stroke="#F59E0B" stroke-width="0.8"/>
  <text x="450" y="413" text-anchor="middle" font-size="12" font-weight="600" fill="#92400E">Compare against profile-specific threshold</text>

  <line x1="300" y1="426" x2="150" y2="445" stroke="#7C3AED" stroke-width="1" marker-end="url(#a)"/>
  <line x1="450" y1="426" x2="450" y2="445" stroke="#EF4444" stroke-width="1" marker-end="url(#a)"/>
  <line x1="600" y1="426" x2="750" y2="445" stroke="#10B981" stroke-width="1" marker-end="url(#a)"/>

  <rect x="60" y="448" width="180" height="28" rx="6" fill="#EDE9FE" stroke="#7C3AED" stroke-width="0.8"/>
  <text x="150" y="466" text-anchor="middle" font-size="11" font-weight="600" fill="#4C1D95">ADHD: &gt; 0.35</text>

  <rect x="360" y="448" width="180" height="28" rx="6" fill="#FEE2E2" stroke="#EF4444" stroke-width="0.8"/>
  <text x="450" y="466" text-anchor="middle" font-size="11" font-weight="600" fill="#7F1D1D">Dyslexia: &gt; 0.25</text>

  <rect x="660" y="448" width="180" height="28" rx="6" fill="#D1FAE5" stroke="#10B981" stroke-width="0.8"/>
  <text x="750" y="466" text-anchor="middle" font-size="11" font-weight="600" fill="#065F46">Autism: &gt; 0.45</text>
</svg>
