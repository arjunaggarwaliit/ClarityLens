<svg viewBox="0 0 900 420" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="a" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect x="320" y="15" width="260" height="65" rx="12" fill="#D1FAE5" stroke="#10B981" stroke-width="1.5"/>
  <text x="450" y="42" text-anchor="middle" font-size="15" font-weight="700" fill="#065F46">IDLE</text>
  <text x="450" y="60" text-anchor="middle" font-size="10" fill="#047857">All buttons: "Simplify this" (enabled)</text>
  <text x="450" y="73" text-anchor="middle" font-size="9" fill="#059669">User can click any button</text>

  <path d="M320 48 L100 48 L100 180" fill="none" stroke="#EF4444" stroke-width="1.5" marker-end="url(#a)"/>
  <text x="115" y="110" font-size="10" font-weight="600" fill="#EF4444">Tier B auto-starts</text>
  <text x="115" y="125" font-size="9" fill="#EF4444">(5 paragraphs to server)</text>

  <path d="M580 48 L800 48 L800 180" fill="none" stroke="#7C3AED" stroke-width="1.5" marker-end="url(#a)"/>
  <text x="670" y="110" font-size="10" font-weight="600" fill="#7C3AED">User clicks button</text>

  <rect x="20" y="185" width="300" height="95" rx="12" fill="#FEE2E2" stroke="#EF4444" stroke-width="1.5"/>
  <text x="170" y="215" text-anchor="middle" font-size="15" font-weight="700" fill="#7F1D1D">TIER_B_PROCESSING</text>
  <text x="170" y="235" text-anchor="middle" font-size="10" fill="#991B1B">All buttons: "Waiting..." (disabled)</text>
  <text x="170" y="252" text-anchor="middle" font-size="10" fill="#991B1B">Pulsing CSS animation</text>
  <text x="170" y="269" text-anchor="middle" font-size="9" fill="#B91C1C">Backend processing 5 items batched</text>

  <rect x="580" y="185" width="300" height="95" rx="12" fill="#EDE9FE" stroke="#7C3AED" stroke-width="1.5"/>
  <text x="730" y="215" text-anchor="middle" font-size="15" font-weight="700" fill="#4C1D95">USER_REQUEST</text>
  <text x="730" y="235" text-anchor="middle" font-size="10" fill="#5B21B6">Active button: "Simplifying..."</text>
  <text x="730" y="252" text-anchor="middle" font-size="10" fill="#5B21B6">All others: "Queued..." (disabled)</text>
  <text x="730" y="269" text-anchor="middle" font-size="9" fill="#6D28D9">Processing 1 item, queue drains serially</text>

  <path d="M170 280 L170 340 L318 340" fill="none" stroke="#10B981" stroke-width="1.5" marker-end="url(#a)"/>
  <text x="175" y="320" font-size="10" font-weight="600" fill="#10B981">Tier B done (try/finally)</text>

  <path d="M730 280 L730 340 L582 340" fill="none" stroke="#10B981" stroke-width="1.5" marker-end="url(#a)"/>
  <text x="635" y="320" font-size="10" font-weight="600" fill="#10B981">Queue empty</text>

  <rect x="320" y="320" width="260" height="48" rx="12" fill="#D1FAE5" stroke="#10B981" stroke-width="1.5"/>
  <text x="450" y="345" text-anchor="middle" font-size="14" font-weight="700" fill="#065F46">IDLE</text>
  <text x="450" y="361" text-anchor="middle" font-size="10" fill="#047857">Unlock all buttons</text>

  <path d="M730 280 L730 300 L860 300 L860 225 L880 225" fill="none" stroke="#7C3AED" stroke-width="1" stroke-dasharray="4 3"/>
  <path d="M880 240 L860 250 L860 275 L730 280" fill="none" stroke="#7C3AED" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#a)"/>
  <text x="868" y="220" font-size="9" font-weight="600" fill="#7C3AED">next</text>
  <text x="868" y="255" font-size="9" font-weight="600" fill="#7C3AED">item</text>

  <path d="M320 340 L280 340 L280 310 L320 280" fill="none" stroke="#7C3AED" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#a)"/>
  <text x="255" y="315" text-anchor="end" font-size="9" fill="#7C3AED">flush queued</text>

  <rect x="150" y="390" width="600" height="28" rx="6" fill="#F9FAFB" stroke="#D1D5DB" stroke-width="0.8"/>
  <text x="450" y="409" text-anchor="middle" font-size="10" font-weight="500" fill="#374151">Guarantee: max 1 concurrent API call at all times — no server flood possible</text>
</svg>
